<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>YASAI↯ Homepage</title>
<style>
  html, body {
    height: 100%;
    margin: 0;
    font-family: "Segoe UI", "Helvetica Neue", sans-serif;
  }

  body {
    background: linear-gradient(
      to bottom,
      black 0%,
      black 18%,
      blue 30%,
      purple 65%,
      crimson 100%
    );
    background-attachment: fixed;
    color: white;
  }

  h1 {
    text-align: center;
    margin: 0;
    padding: 20px 40px;
    font-size: 35px;
    display: inline-block;
    border: 2px solid white;
    border-radius: 12px;
    background-color: rgba(0, 0, 0, 0.4);
    letter-spacing: 2px;
    cursor: pointer;
  }

  .title-wrap {
    text-align: center;
    padding-top: 30px;
  }

  h3 {
    font-size: 28px;
    text-align: center;
    margin-top: 40px;
    text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.8);
  }

  .video-row {
    display: flex;
    justify-content: center;
    gap: 100px;
    flex-wrap: wrap;
    padding: 20px;
  }

  .video-row video {
    border: 2px solid white;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);

    opacity: 0;
    transform: translateX(100px);
    animation: slideIn 0.8s ease-out forwards;
  }

  .video-row video:nth-child(2) {
    animation-delay: 0.2s;
  }
  
.video-row video:nth-child(3) {
  animation-delay: 0.4s;
}

  @keyframes slideIn {
    from {
      opacity: 0;
      transform: translateX(100px);
    }
    to {
      opacity: 1;
      transform: translateX(0);
    }
  }
</style>
</head>
<body>

  <div class="title-wrap">
    <h1 onclick="document.getElementById('clickSound').play()">YASAI↯</h1>
  </div>

  <audio id="clickSound" src="sound.mp3"></audio>

  <h3>Dynamike Clips</h3>

  <div class="video-row">
    <video src="clip.mp4" controls width="500"></video>
    <video src="clip2.mp4" controls width="500"></video>
    <video src="clip3.mp4" controls width="500"></video>
  </div>

</body>
</html>
